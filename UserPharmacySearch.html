<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFinder - Pharmacy Search</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="UserPharmacySearch.css">
</head>
<body>

    <!-- ===================== SIDEBAR ===================== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <div class="sidebar-inner">
            <!-- Logo -->
            <div class="sidebar__logo">
                <div class="sidebar__logo-icon">
                    <img src="Images/Logo.png" alt="MediFinder Logo">
                </div>
                <div class="sidebar__logo-text">
                    <span class="sidebar__brand">MediFinder</span>
                    <span class="sidebar__portal">User Portal</span>
                </div>
            </div>

            <!-- Nav -->
            <nav class="sidebar__nav">
                <a href="UserDashboard.html" class="nav-item">
                    <i class="fa-solid fa-table-cells-large nav-item__icon"></i>
                    <span>Dashboard</span>
                </a>
                <a href="UserPharmacySearch.html" class="nav-item nav-item--active">
                    <i class="fa-solid fa-magnifying-glass nav-item__icon"></i>
                    <span>Pharmacy Search</span>
                </a>
                <a href="UserProfile.html" class="nav-item">
                    <i class="fa-regular fa-user nav-item__icon"></i>
                    <span>Profile</span>
                </a>
                <a href="UserHistory.html" class="nav-item">
                    <i class="fa-solid fa-clock-rotate-left nav-item__icon"></i>
                    <span>My History</span>
                </a>
                <a href="UserReminders.html" class="nav-item">
                    <i class="fa-regular fa-bell nav-item__icon"></i>
                    <span>Set Reminders</span>
                </a>
            </nav>

            <!-- User Profile Footer -->
            <div class="sidebar__user">
                <div class="user-avatar">
                    <img src="Images/ProfileAvatar.jpg" alt="User"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                    <div class="user-avatar__fallback" style="display:none">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>
                <div class="user-meta">
                    <span class="user-name" id="sidebarUserName">Loading...</span>
                    <span class="user-email" id="sidebarUserEmail"></span>
                </div>
                <a href="#" class="user-logout" id="logoutBtn" title="Log out">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </a>
            </div>
        </div>
    </aside>

    <!-- ===================== MAIN CONTENT ===================== -->
    <main class="main">

        <!-- Top Bar -->
        <header class="topbar">
            <button class="topbar__hamburger" id="hamburgerBtn" aria-label="Toggle sidebar">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="topbar__title">
                <h1>Pharmacy Search</h1>
                <nav class="breadcrumb" aria-label="breadcrumb">
                    <span>Dashboard</span>
                    <i class="fa-solid fa-chevron-right"></i>
                    <span class="breadcrumb__active">Pharmacy Search</span>
                </nav>
            </div>
        </header>

        <!-- Search Bar -->
        <section class="search-section">
            <div class="search-bar">
                <div class="search-bar__input-wrap">
                    <i class="fa-solid fa-magnifying-glass search-bar__icon"></i>
                    <input
                        type="search"
                        id="searchInput"
                        class="search-bar__input"
                        value=""
                        placeholder="Search by medicine name, brand, or category..."
                        aria-label="Search medicines"
                        autocomplete="off"
                    >
                </div>
                <!-- Upload Prescription button — triggers hidden file input in JS -->
                <button class="upload-btn" id="uploadPrescriptionBtn">
                    <i class="fa-solid fa-camera"></i>
                    <span>Upload Prescription</span>
                </button>
            </div>
        </section>

        <!-- Results Header -->
        <section class="results-header">
            <p class="results-count" id="resultsCount">
                Type a medicine name above to search
            </p>
            <div class="sort-group">
                <button class="sort-btn sort-btn--active" data-sort="nearest">
                    <i class="fa-solid fa-location-dot"></i> Nearest
                </button>
                <button class="sort-btn" data-sort="cheapest">
                    <i class="fa-solid fa-tag"></i> Cheapest
                </button>
            </div>
        </section>

        <!-- ===================== PHARMACY CARDS ===================== -->
        <!-- Cards injected dynamically by UserPharmacySearch.js -->
        <section class="pharmacy-list" id="pharmacyList">
            <div class="empty-state" id="initialState">
                <i class="fa-solid fa-pills"></i>
                <p>Search for a medicine to see available pharmacies</p>
            </div>
        </section>

    </main>

    <!-- ===================== SCRIPTS ===================== -->
    <!-- Supabase client library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>

    <!--
        Tesseract.js — client-side OCR library (WebAssembly-based).
        Loaded from CDN so no npm/build step is needed.
        Used by the prescription scanner in UserPharmacySearch.js.
        ~2 MB download; cached by the browser after first load.
    -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <!-- Main pharmacy search + prescription scanner logic -->
    <script src="UserPharmacySearch.js"></script>

</body>
</html>
