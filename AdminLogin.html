<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFinder — Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/9dec450bb1.js" crossorigin="anonymous"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green: #208B3A;
            --green-light: #52B167;
            --green-bg: #f0fdf4;
            --green-border: #bbf7d0;
            --dark: #1a1a1a;
            --gray: #666;
            --light-gray: #e5e5e5;
            --white: #F8FAF8;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.15);
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(32,139,58,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(82,177,103,0.06) 0%, transparent 40%),
                radial-gradient(circle at 60% 80%, rgba(32,139,58,0.05) 0%, transparent 40%);
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: fadeInUp 0.6s ease;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(32,139,58,0.08);
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
            justify-content: center;
        }

        .login-logo .logo-icon {
            width: 44px;
            height: 44px;
            background: var(--green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .login-logo .logo-text {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--gray);
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid var(--green-border);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 15px;
            transition: var(--transition);
        }

        .form-input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1.5px solid var(--light-gray);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Roboto', sans-serif;
            color: var(--dark);
            background: var(--white);
            transition: var(--transition);
            outline: none;
        }

        .form-input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(32,139,58,0.1);
            background: white;
        }

        .form-input:focus + i,
        .input-wrapper:focus-within i {
            color: var(--green);
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            padding: 0;
            font-size: 15px;
            transition: var(--transition);
        }

        .password-toggle:hover { color: var(--green); }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Roboto', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #1a7230;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(32,139,58,0.3);
        }

        .btn-login:active { transform: translateY(0); }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .alert.show { display: flex; }

        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid var(--green-border);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--gray);
        }

        .back-link a {
            color: var(--green);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover { text-decoration: underline; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon"><i class="fa-solid fa-pills"></i></div>
                <span class="logo-text">MediFinder</span>
            </div>

            <div class="login-header">
                <div class="admin-badge">
                    <i class="fa-solid fa-shield-halved"></i>
                    Admin Portal
                </div>
                <h1>Welcome back</h1>
                <p>Sign in to access the admin dashboard</p>
            </div>

            <div class="alert alert-error" id="error-alert">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="error-msg">Invalid credentials. Please try again.</span>
            </div>

            <div class="alert alert-success" id="success-alert">
                <i class="fa-solid fa-circle-check"></i>
                <span>Login successful! Redirecting...</span>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" class="form-input" placeholder="admin@medifinder.pk" autocomplete="email">
                    <i class="fa-solid fa-envelope"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password">
                    <i class="fa-solid fa-lock"></i>
                    <button class="password-toggle" id="pwd-toggle" type="button" tabindex="-1">
                        <i class="fa-solid fa-eye" id="pwd-eye"></i>
                    </button>
                </div>
            </div>

            <button class="btn-login" id="login-btn" onclick="handleLogin()">
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
                Sign In
            </button>

            <p class="back-link">
                <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to MediFinder</a>
            </p>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const { createClient } = window.supabase;
        const supabaseClient = createClient(
            'https://ktzsshlllyjuzphprzso.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0enNzaGxsbHlqdXpwaHByenNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTg4ODksImV4cCI6MjA4Nzk5NDg4OX0.WMoLBWXf0kJ9ebPO6jkIpMY7sFvcL3DRR-KEpY769ic'
        );

        // If already logged in, redirect to dashboard
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'AdminDashboard.html';
        });

        // Password toggle
        document.getElementById('pwd-toggle').addEventListener('click', () => {
            const input = document.getElementById('password');
            const eye = document.getElementById('pwd-eye');
            if (input.type === 'password') {
                input.type = 'text';
                eye.className = 'fa-solid fa-eye-slash';
            } else {
                input.type = 'password';
                eye.className = 'fa-solid fa-eye';
            }
        });

        // Enter key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorAlert = document.getElementById('error-alert');
            const successAlert = document.getElementById('success-alert');

            errorAlert.classList.remove('show');
            successAlert.classList.remove('show');

            if (!email || !password) {
                document.getElementById('error-msg').textContent = 'Please enter email and password.';
                errorAlert.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Signing in...';

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                document.getElementById('error-msg').textContent = error.message || 'Invalid credentials.';
                errorAlert.classList.add('show');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In';
                return;
            }

            // Check admin metadata (optional: set user_metadata.role = 'admin' in Supabase)
            successAlert.classList.add('show');
            setTimeout(() => { window.location.href = 'AdminDashboard.html'; }, 1000);
        }
    </script>
</body>
</html>
